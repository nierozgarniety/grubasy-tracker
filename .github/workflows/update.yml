name: Aktualizuj grubasów

on:
  schedule:
    - cron: '0 */4 * * *'
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Python setup
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Instaluj zależności
        run: pip install requests pandas numpy tqdm

      - name: Uruchom tracker
        run: python eth_smart_money_tracker.py
        env:
          ETHERSCAN_API_KEY: ${{ secrets.ETHERSCAN_API_KEY }}
        continue-on-error: true

      - name: Zapisz wyniki do repo
        run: |
          git config user.name "grubasy-bot"
          git config user.email "bot@grubasy"
          git add -f grubasy_ranking.csv eth_price_cache.json pumps_cache.json 2>/dev/null || true
          git diff --staged --quiet || git commit -m "Update $(date -u '+%Y-%m-%d %H:%M') UTC"
          git push || true
